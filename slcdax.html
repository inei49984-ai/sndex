<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slcdax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Space+Grotesk:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* ----------------------------------------------------
           1. 全体設定
        ---------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none; 
        }

        /* PCの時だけOS標準のカーソルを消す */
        @media (pointer: fine) {
            * {
                cursor: none !important;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #060b16; 
            color: #e2e8f0;
            position: relative;
            min-height: 180vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden; 
        }

        /* ----------------------------------------------------
           2. クールブルー・カーソルシステム
        ---------------------------------------------------- */
        #cursor-ring {
            width: 44px;
            height: 44px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            background: rgba(0, 210, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            display: none; 
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, opacity 0.2s,
                        width 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.25),
                        height 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }

        #cursor-ring.hover {
            width: 90px;
            height: 90px;
            border-color: #ffffff;
            background: rgba(0, 210, 255, 0.06);
            box-shadow: 0 0 30px #00d2ff, inset 0 0 15px rgba(0, 210, 255, 0.2);
        }

        #cursor-dot-container {
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(0, 210, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translate(-50%, -50%);
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        #cursor-dot-container::before {
            content: '';
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 12px #00d2ff;
        }

        .cursor-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00d2ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 8px #00d2ff, 0 0 12px #00d2ff;
            transform: translate(-50%, -50%); 
            animation: fadeOut 0.4s forwards ease-out;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
        }

        .touch-ripple {
            position: fixed;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 15px #00d2ff;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes rippleEffect {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        /* ----------------------------------------------------
           3. 新設：AIチャット風フローティングUIコンソール
        ---------------------------------------------------- */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 6, 13, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ui-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .ui-console {
            width: 90%;
            max-width: 680px;
            background: #0b1326;
            border: 1px solid rgba(0, 210, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 210, 255, 0.1);
            padding: 30px;
            position: relative;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ui-overlay.open .ui-console {
            transform: scale(1) translateY(0);
        }

        /* コンソールのヘッダー */
        .ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .ui-title {
            font-size: 14px;
            font-weight: bold;
            color: #00d2ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ui-close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: none;
            transition: color 0.2s;
        }
        .ui-close-btn:hover {
            color: #ffffff;
        }

        /* チャット風入力ボックス型コンテナ */
        .ai-input-container {
            width: 100%;
            background: rgba(6, 11, 22, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .ai-prompt-placeholder {
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* ブランドリンク・アイコンエリア */
        .ai-action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .brand-icon-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #111a2e;
            border: 1px solid rgba(0, 210, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        /* SVGアイコンの色調とサイズ調整 */
        .brand-icon-link svg {
            width: 22px;
            height: 22px;
            fill: #00d2ff;
            transition: fill 0.25s ease, transform 0.25s ease;
        }

        /* 各アイコンのホバー挙動 */
        @media (pointer: fine) {
            .brand-icon-link:hover {
                background: #00d2ff;
                border-color: #00d2ff;
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            }
            .brand-icon-link:hover svg {
                fill: #060b16;
                transform: scale(1.1);
            }
        }

        .brand-icon-link:active {
            transform: scale(0.95);
        }

        /* ----------------------------------------------------
           4. 各セクションのレイアウト
        ---------------------------------------------------- */
        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 20px;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            width: 80%;
            max-width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.06) 0%, rgba(6, 11, 22, 0) 70%);
            z-index: 0;
        }

        .brand-huge {
            font-size: clamp(65px, 16vw, 220px); 
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -3px;
            line-height: 0.85;
            text-transform: lowercase;
            z-index: 10;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            touch-action: manipulation;
        }

        .brand-huge span {
            color: #00d2ff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        }

        @media (pointer: fine) {
            .brand-huge:hover {
                transform: scale(1.02);
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            letter-spacing: 4px;
            color: #24354b;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(6px); }
        }

        .content-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 24px;
            text-align: center;
            z-index: 10;
        }

        .site-description {
            font-size: clamp(16px, 4vw, 22px); 
            color: #94a3b8;
            max-width: 650px;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .service-action-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .action-trigger {
            background: rgba(0, 210, 255, 0.02);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 16px 36px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
            transition: all 0.25s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary:hover {
            background: #ffffff;
            color: #060b16;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 40px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        @media (pointer: fine) {
            .btn-secondary:hover {
                background: rgba(255, 255, 255, 0.05);
                border-color: #00d2ff;
                color: #00d2ff;
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
                transform: translateY(-2px);
            }
        }

        .action-trigger:active {
            transform: translateY(1px) scale(0.96);
        }

        .footer-signature-container {
            margin-top: auto; 
            width: 100%;
            padding: 60px 0 50px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #03060d; 
            border-top: 1px solid rgba(255, 255, 255, 0.01);
        }

        .brand-signature {
            font-family: 'Alex Brush', cursive;
            font-size: clamp(38px, 6vw, 65px);
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.7;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (pointer: fine) {
            .brand-signature:hover {
                opacity: 1;
                color: #ffffff;
                letter-spacing: 5px;
                text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            }
        }

        .signature-sub {
            font-size: 10px;
            color: #24354b;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="cursor-ring"></div>
    <div id="cursor-dot-container"></div>

    <!-- ----------------------------------------------------
       UIコンソール（AIチャット入力画面風ポップアップ）
    ---------------------------------------------------- -->
    <div class="ui-overlay" id="ui-overlay">
        <div class="ui-console">
            <div class="ui-header">
                <span class="ui-title">System Console</span>
                <button class="ui-close-btn" id="ui-close-btn">✕</button>
            </div>
            <div class="ai-input-container">
                <div class="ai-prompt-placeholder">制作者の情報にアクセスしますか？</div>
                <div class="ai-action-bar">
                    <!-- Discord アイコンボタン -->
                    <a href="https://discord.com/users/あなたのID" target="_blank" class="brand-icon-link" title="Discord">
                        <svg viewBox="0 0 127.14 96.36">
                            <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-11A68.55,68.55,0,0,1,28,80.47c1-.72,2-1.47,3-2.25a74.55,74.55,0,0,0,65.3,0c1,.78,2,1.53,3,2.25a68.55,68.55,0,0,1-10.74,4.9,74.37,74.37,0,0,0,6.72,11,105.73,105.73,0,0,0,31.29-18.83C130.23,48.22,123.66,25.43,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.93,46,53.82,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.17,46,96.06,53,91,65.69,84.69,65.69Z"/>
                        </svg>
                    </a>
                    <!-- GitHub アイコンボタン -->
                    <a href="https://github.com/inei49984-ai" target="_blank" class="brand-icon-link" title="GitHub">
                        <svg viewBox="0 0 98 96">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.261 33.4 46.754 2.443.453 3.332-.1 3.332-2.372 0-1.17-.04-4.269-.062-8.38-13.59 2.978-16.458-6.611-16.458-6.611-2.222-5.692-5.424-7.207-5.424-7.207-4.434-3.055.336-2.995.336-2.995 4.903.348 7.484 5.086 7.484 5.086 4.359 7.534 11.432 5.358 14.217 4.095.442-3.187 1.705-5.361 3.102-6.594-10.85-1.243-22.256-5.474-22.256-24.378 0-5.387 1.905-9.79 5.039-13.239-.504-1.25-2.184-6.269.477-13.06 0 0 4.113-1.328 13.473 5.068 3.908-1.096 8.099-1.644 12.263-1.663 4.159.019 8.354.567 12.27 1.663 9.347-6.396 13.447-5.068 13.447-5.068 2.67 6.791.99 11.81.487 13.06 3.14 3.449 5.033 7.852 5.033 13.239 0 18.952-11.425 23.121-22.31 24.339 1.756 1.527 3.322 4.529 3.322 9.127 0 6.591-.06 11.907-.06 13.525 0 2.292.876 4.861 3.364 4.374C84.025 89.467 98 70.97 98 49.217 98 22 76.155 0 48.854 0z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="hero-section">
        <h1 class="brand-huge">slcdax<span>.</span></h1>
        <div class="scroll-indicator">↓ Scroll Down</div>
    </div>

    <div class="content-section">
        <p class="site-description">
            多目的で開発者の意図によってサービスが提供されます。
        </p>
        
        <div class="service-action-group">
            <button class="action-trigger btn-secondary" id="creator-info-btn">
                制作者の情報
            </button>
            <button class="action-trigger btn-primary" id="test-dl-btn">
                testのダウンロード
            </button>
        </div>
    </div>

    <div class="footer-signature-container">
        <h2 class="brand-signature">Slcdax</h2>
        <p class="signature-sub">AUTHENTIC SIGNATURE</p>
    </div>

    <script>
        const ring = document.getElementById('cursor-ring');
        const dotContainer = document.getElementById('cursor-dot-container');
        
        let mouseX = 0; let mouseY = 0;
        let ringX = 0; let ringY = 0;
        
        const delaySpeed = 0.06;
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        if (!isTouchDevice) {
            ring.style.display = 'block';
            dotContainer.style.display = 'flex';

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                dotContainer.style.left = mouseX + 'px';
                dotContainer.style.top = mouseY + 'px';
                
                ring.style.opacity = '1';
                dotContainer.style.opacity = '1';

                createParticle(mouseX, mouseY);
            });

            document.addEventListener('mouseleave', () => { ring.style.opacity = '0'; dotContainer.style.opacity = '0'; });
            document.addEventListener('mouseenter', () => { ring.style.opacity = '1'; dotContainer.style.opacity = '1'; });

            function animateCursor() {
                ringX += (mouseX - ringX) * delaySpeed;
                ringY += (mouseY - ringY) * delaySpeed;
                ring.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            const refreshHover = () => {
                const targets = document.querySelectorAll('.brand-huge, .action-trigger, .brand-signature, .brand-icon-link, .ui-close-btn');
                targets.forEach(el => {
                    el.addEventListener('mouseenter', () => ring.classList.add('hover'));
                    el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
                });
            };
            refreshHover();

            function createParticle(x, y) {
                if (Math.abs(mouseX - ringX) < 1 && Math.abs(mouseY - ringY) < 1) return;
                const particle = document.createElement('div');
                particle.classList.add('cursor-particle');
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 400); 
            }
        } else {
            window.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                createTouchRipple(touch.clientX, touch.clientY);
                createMobileParticle(touch.clientX, touch.clientY);
            }, { passive: true });
        }

        function createTouchRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.classList.add('touch-ripple');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        }

        function createMobileParticle(x, y) {
            for(let i=0; i<3; i++) {
                const p = document.createElement('div');
                p.classList.add('cursor-particle');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 400);
            }
        }

        /* ----------------------------------------------------
           UIコンソール ポップアップ制御ロジック
        ---------------------------------------------------- */
        const creatorInfoBtn = document.getElementById('creator-info-btn');
        const uiOverlay = document.getElementById('ui-overlay');
        const uiCloseBtn = document.getElementById('ui-close-btn');

        // 「制作者の情報」ボタンクリックでUIを出現させる
        creatorInfoBtn.addEventListener('click', () => {
            uiOverlay.classList.add('open');
        });

        // ✕ボタンクリックでUIを閉じる
        uiCloseBtn.addEventListener('click', () => {
            uiOverlay.classList.remove('open');
            if (ring) ring.classList.remove('hover');
        });

        // コンソールの外枠（背景の暗がり）をクリックしたときも自動で閉じる
        uiOverlay.addEventListener('click', (e) => {
            if (e.target === uiOverlay) {
                uiOverlay.classList.remove('open');
                if (ring) ring.classList.remove('hover');
            }
        });

        // txtファイル自動生成・自動ダウンロード
        document.getElementById('test-dl-btn').addEventListener('click', () => {
            const textContent = "お？このファイルダウンロードしたね？てすとだよてすと！";
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, textContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'test.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
