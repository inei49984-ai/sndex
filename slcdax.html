<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slcdax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Space+Grotesk:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        @media (pointer: fine) {
            * { cursor: none !important; }
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: #020510;
            color: #e2e8f0;
            position: relative;
            min-height: 180vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ====================================================
           BACKGROUND CANVAS
        ==================================================== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ====================================================
           CURSOR CANVAS (overlay, all cursor drawing is in JS)
        ==================================================== */
        #cursor-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        .touch-ripple {
            position: fixed;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            background: rgba(0, 210, 255, 0.1);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes rippleEffect {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        /* ====================================================
           HAMBURGER
        ==================================================== */
        .header-menu-trigger {
            position: fixed;
            top: 30px;
            right: 40px;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            background: none;
            border: none;
            z-index: 1500;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-bar {
            height: 2px;
            background-color: #ffffff;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 2px;
        }

        .bar-top { width: 28px; }
        .bar-mid { width: 20px; }
        .bar-bot { width: 25px; }

        @media (pointer: fine) {
            .header-menu-trigger:hover .menu-bar {
                background-color: #00d2ff;
                width: 32px;
            }
        }

        .header-menu-trigger:active { transform: scale(0.9); }

        /* ====================================================
           UI CONSOLE
        ==================================================== */
        .ui-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(2, 5, 16, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ui-overlay.open { opacity: 1; pointer-events: auto; }

        .ui-console {
            width: 90%;
            max-width: 680px;
            background: #080f22;
            border: 1px solid rgba(0, 210, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 210, 255, 0.1);
            padding: 30px;
            position: relative;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ui-overlay.open .ui-console { transform: scale(1) translateY(0); }

        .ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .ui-title {
            font-size: 14px;
            font-weight: bold;
            color: #00d2ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ui-close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            transition: color 0.2s;
        }

        @media (pointer: fine) {
            .ui-close-btn:hover { color: #ffffff; }
        }

        .ai-input-container {
            width: 100%;
            background: rgba(2, 5, 16, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .ai-prompt-placeholder {
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .ai-action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .brand-icon-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0f1a30;
            border: 1px solid rgba(0, 210, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .brand-icon-link svg {
            width: 22px;
            height: 22px;
            fill: #00d2ff;
            transition: fill 0.25s ease, transform 0.25s ease;
        }

        @media (pointer: fine) {
            .brand-icon-link:hover {
                background: #00d2ff;
                border-color: #00d2ff;
                box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            }
            .brand-icon-link:hover svg {
                fill: #020510;
                transform: scale(1.1);
            }
        }

        .brand-icon-link:active { transform: scale(0.95); }

        /* ====================================================
           SECTIONS
        ==================================================== */
        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 20px;
            z-index: 10;
        }

        .brand-huge {
            font-size: clamp(65px, 16vw, 220px);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -3px;
            line-height: 0.85;
            text-transform: lowercase;
            z-index: 10;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            touch-action: manipulation;
            text-shadow: 0 0 80px rgba(0, 210, 255, 0.15);
        }

        .brand-huge span {
            color: #00d2ff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.6), 0 0 60px rgba(0, 210, 255, 0.3);
        }

        @media (pointer: fine) {
            .brand-huge:hover { transform: scale(1.02); }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            letter-spacing: 4px;
            color: #24354b;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(6px); }
        }

        .content-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 24px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .site-description {
            font-size: clamp(16px, 4vw, 22px);
            color: #94a3b8;
            max-width: 650px;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .service-action-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .action-trigger {
            background: rgba(0, 210, 255, 0.02);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 16px 36px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
            transition: all 0.25s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary:hover {
            background: #ffffff;
            color: #020510;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 40px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
        }

        .action-trigger:active { transform: translateY(1px) scale(0.96); }

        .footer-signature-container {
            margin-top: auto;
            width: 100%;
            padding: 60px 0 50px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(2, 5, 16, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 10;
        }

        .brand-signature {
            font-family: 'Alex Brush', cursive;
            font-size: clamp(38px, 6vw, 65px);
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.7;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (pointer: fine) {
            .brand-signature:hover {
                opacity: 1;
                color: #ffffff;
                letter-spacing: 5px;
                text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            }
        }

        .signature-sub {
            font-size: 10px;
            color: #24354b;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>

    <script>
    /* ====================================================
       BACKGROUND — lightweight: stars + static nebula + geometry
    ==================================================== */
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        // Stars — static positions, no shadow, just twinkle alpha
        const STAR_COUNT = 160;
        const stars = Array.from({ length: STAR_COUNT }, () => ({
            x: Math.random() * 1, y: Math.random() * 1,
            r: Math.random() * 1.2 + 0.3,
            a: Math.random() * 0.6 + 0.15,
            tw: Math.random() * Math.PI * 2
        }));

        // Geometry nodes — fewer, no shadowBlur
        const GEO = Array.from({ length: 12 }, () => ({
            x: Math.random(), y: Math.random(),
            vx: (Math.random() - 0.5) * 0.00010,
            vy: (Math.random() - 0.5) * 0.00010
        }));

        // Draw nebula once onto offscreen canvas (static, no per-frame redraw)
        const nebulaCanvas = document.createElement('canvas');
        function bakeNebula() {
            nebulaCanvas.width = W; nebulaCanvas.height = H;
            const nc = nebulaCanvas.getContext('2d');
            const blobs = [
                { x: 0.18, y: 0.25, rx: 0.32, r: 255, g: 60,  b: 120, a: 0.04 },
                { x: 0.78, y: 0.55, rx: 0.28, r: 60,  g: 80,  b: 255, a: 0.045},
                { x: 0.50, y: 0.82, rx: 0.38, r: 0,   g: 200, b: 255, a: 0.035},
                { x: 0.85, y: 0.15, rx: 0.20, r: 120, g: 0,   b: 255, a: 0.03 }
            ];
            blobs.forEach(n => {
                const px = n.x * W, py = n.y * H, rad = n.rx * W;
                const g = nc.createRadialGradient(px, py, 0, px, py, rad);
                g.addColorStop(0,   `rgba(${n.r},${n.g},${n.b},${n.a})`);
                g.addColorStop(0.5, `rgba(${n.r},${n.g},${n.b},${n.a * 0.35})`);
                g.addColorStop(1,   'rgba(0,0,0,0)');
                nc.fillStyle = g;
                nc.beginPath();
                nc.arc(px, py, rad, 0, Math.PI * 2);
                nc.fill();
            });
        }
        bakeNebula();
        window.addEventListener('resize', bakeNebula);

        function loop(t) {
            // bg
            ctx.fillStyle = '#020510';
            ctx.fillRect(0, 0, W, H);

            // nebula (single drawImage — cheap)
            ctx.drawImage(nebulaCanvas, 0, 0);

            // stars — no shadowBlur, just globalAlpha twinkle
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.a * (0.55 + Math.sin(t * 0.0008 + s.tw) * 0.45);
                ctx.beginPath();
                ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // geometry lines — batch all into one path per alpha level is expensive;
            // instead just iterate but NO save/restore, NO shadowBlur
            GEO.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if (n.x < 0) n.x = 1; if (n.x > 1) n.x = 0;
                if (n.y < 0) n.y = 1; if (n.y > 1) n.y = 0;
            });
            const DIST = 0.22;
            for (let i = 0; i < GEO.length; i++) {
                for (let j = i + 1; j < GEO.length; j++) {
                    const a = GEO[i], b = GEO[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < DIST) {
                        ctx.globalAlpha = (1 - d / DIST) * 0.15;
                        ctx.strokeStyle = '#00d2ff';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(a.x * W, a.y * H);
                        ctx.lineTo(b.x * W, b.y * H);
                        ctx.stroke();
                    }
                }
            }
            ctx.globalAlpha = 1;

            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();

    /* ====================================================
       CURSOR — Canvas, zero position lag, minimal shadowBlur
    ==================================================== */
    (function() {
        const cc = document.getElementById('cursor-canvas');
        const cx = cc.getContext('2d');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        let CW, CH;
        function resizeCursor() { CW = cc.width = window.innerWidth; CH = cc.height = window.innerHeight; }
        resizeCursor();
        window.addEventListener('resize', resizeCursor);

        let mx = -999, my = -999;
        let visible = false;
        let isHover = false;
        let hoverEl = null;   // the actual hovered element

        // Ring size — only size lerps, position is instant
        let ringR = 22, ringRTarget = 22;
        const RING_NORMAL = 22, RING_HOVER = 45;

        // Pulse
        let glowPhase = 0;

        // Water-drop ripples: { cx, cy, rw, rh, r, life, maxR }
        //   rw/rh = half-width/height of the bounding rect (for ellipse shape)
        const ripples = [];

        if (!isTouchDevice) {
            window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; visible = true; });
            document.addEventListener('mouseleave', () => { visible = false; });
            document.addEventListener('mouseenter', () => { visible = true; });

            const hoverTargets = document.querySelectorAll('.brand-huge, .action-trigger, .brand-signature, .brand-icon-link, .ui-close-btn, .header-menu-trigger');
            hoverTargets.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    isHover = true; hoverEl = el;
                    // spawn ripple from element center, sized to wrap the element
                    const rect = el.getBoundingClientRect();
                    const cx2 = rect.left + rect.width  / 2;
                    const cy2 = rect.top  + rect.height / 2;
                    const hw  = rect.width  / 2 + 8;   // slightly outside
                    const hh  = rect.height / 2 + 8;
                    // spawn 3 rings with slight delay encoded as negative life-start
                    for (let i = 0; i < 3; i++) {
                        ripples.push({ ex: cx2, ey: cy2, hw, hh, r: 0, life: 1.0 - i * 0.22, delay: i * 0.22 });
                    }
                });
                el.addEventListener('mouseleave', () => { isHover = false; hoverEl = null; });
            });
        } else {
            window.addEventListener('touchstart', e => {
                const t = e.touches[0];
                const el = document.elementFromPoint(t.clientX, t.clientY);
                const target = el && el.closest('.brand-huge, .action-trigger, .brand-signature, .brand-icon-link, .ui-close-btn, .header-menu-trigger');
                if (target) {
                    const rect = target.getBoundingClientRect();
                    const hw = rect.width / 2 + 8, hh = rect.height / 2 + 8;
                    for (let i = 0; i < 3; i++) {
                        ripples.push({ ex: rect.left + rect.width/2, ey: rect.top + rect.height/2, hw, hh, r: 0, life: 1.0 - i * 0.22, delay: i * 0.22 });
                    }
                }
            }, { passive: true });
        }

        function drawCursorFrame() {
            cx.clearRect(0, 0, CW, CH);
            if (isTouchDevice && ripples.length === 0) { requestAnimationFrame(drawCursorFrame); return; }
            if (!isTouchDevice && !visible && ripples.length === 0) { requestAnimationFrame(drawCursorFrame); return; }

            glowPhase += 0.04;
            const pulse = (Math.sin(glowPhase) + 1) * 0.5; // 0→1

            ringRTarget = isHover ? RING_HOVER : RING_NORMAL;
            ringR += (ringRTarget - ringR) * 0.16;

            // ---- Water-drop ripples (ellipse expanding, fading) ----
            for (let i = ripples.length - 1; i >= 0; i--) {
                const rp = ripples[i];
                if (rp.delay > 0) { rp.delay -= 0.02; continue; }
                rp.r += 0.035;  // 0→1 expansion progress
                rp.life -= 0.018;
                if (rp.life <= 0 || rp.r >= 1) { ripples.splice(i, 1); continue; }

                // ellipse: starts at hw/hh, expands outward
                const scale = 1 + rp.r * 1.4; // 1x → 2.4x
                const ew = rp.hw * scale;
                const eh = rp.hh * scale;
                const alpha = rp.life * (1 - rp.r) * 0.9;

                cx.save();
                cx.globalAlpha = alpha;
                cx.strokeStyle = '#00d2ff';
                cx.lineWidth = 1.5 * (1 - rp.r * 0.6);
                cx.beginPath();
                cx.ellipse(rp.ex, rp.ey, ew, eh, 0, 0, Math.PI * 2);
                cx.stroke();
                cx.restore();
            }

            if (isTouchDevice || !visible) { requestAnimationFrame(drawCursorFrame); return; }

            // ---- Outer soft glow (one gradient, no shadowBlur) ----
            const gR = ringR * 4.5 + pulse * ringR * 1.5;
            const gA = 0.07 + pulse * 0.18;
            const og = cx.createRadialGradient(mx, my, ringR, mx, my, gR);
            og.addColorStop(0,   `rgba(0,210,255,${gA})`);
            og.addColorStop(1,   'rgba(0,0,0,0)');
            cx.fillStyle = og;
            cx.beginPath();
            cx.arc(mx, my, gR, 0, Math.PI * 2);
            cx.fill();

            // ---- Ring stroke (single draw, shadowBlur only here) ----
            const ringAlpha = 0.65 + pulse * 0.35;
            cx.save();
            cx.strokeStyle = isHover ? `rgba(255,255,255,${ringAlpha})` : `rgba(0,210,255,${ringAlpha})`;
            cx.lineWidth = 1.5 + pulse * 0.8;
            cx.shadowBlur  = 10 + pulse * 20;   // 10→30 — ONE shadowBlur call total
            cx.shadowColor = isHover ? '#ffffff' : '#00d2ff';
            cx.beginPath();
            cx.arc(mx, my, ringR, 0, Math.PI * 2);
            cx.stroke();
            cx.restore();

            // ---- Inner light fill ----
            const ig = cx.createRadialGradient(mx, my - ringR * 0.1, 0, mx, my, ringR);
            ig.addColorStop(0,   `rgba(220,250,255,${0.06 + pulse * 0.50})`);
            ig.addColorStop(0.4, `rgba(0,210,255,${0.02 + pulse * 0.22})`);
            ig.addColorStop(1,   'rgba(0,0,0,0)');
            cx.fillStyle = ig;
            cx.beginPath();
            cx.arc(mx, my, ringR, 0, Math.PI * 2);
            cx.fill();

            // ---- Specular glint ----
            const sx = mx - ringR * 0.25, sy = my - ringR * 0.28;
            const sg = cx.createRadialGradient(sx, sy, 0, sx, sy, ringR * 0.48);
            sg.addColorStop(0,   `rgba(255,255,255,${0.18 + pulse * 0.52})`);
            sg.addColorStop(1,   'rgba(255,255,255,0)');
            cx.save();
            cx.beginPath();
            cx.arc(mx, my, ringR * 0.94, 0, Math.PI * 2);
            cx.clip();
            cx.fillStyle = sg;
            cx.fillRect(mx - ringR, my - ringR, ringR * 2, ringR * 2);
            cx.restore();

            // ---- Center dot (no shadowBlur) ----
            const dotR = 2.5 + pulse * 3;
            const dg = cx.createRadialGradient(mx, my, 0, mx, my, dotR * 1.8);
            dg.addColorStop(0, '#ffffff');
            dg.addColorStop(0.5, `rgba(160,240,255,${0.6 + pulse * 0.4})`);
            dg.addColorStop(1, 'rgba(0,210,255,0)');
            cx.fillStyle = dg;
            cx.beginPath();
            cx.arc(mx, my, dotR, 0, Math.PI * 2);
            cx.fill();

            requestAnimationFrame(drawCursorFrame);
        }
        requestAnimationFrame(drawCursorFrame);

        window._setCursorHover = v => { isHover = v; };
    })();

    /* ====================================================
       UI CONSOLE
    ==================================================== */
    const globalMenuBtn = document.getElementById('global-menu-btn');
    const uiOverlay = document.getElementById('ui-overlay');
    const uiCloseBtn = document.getElementById('ui-close-btn');

    globalMenuBtn.addEventListener('click', () => uiOverlay.classList.add('open'));
    uiCloseBtn.addEventListener('click', () => { uiOverlay.classList.remove('open'); window._setCursorHover && window._setCursorHover(false); });
    uiOverlay.addEventListener('click', e => {
        if (e.target === uiOverlay) { uiOverlay.classList.remove('open'); window._setCursorHover && window._setCursorHover(false); }
    });

    /* ====================================================
       DOWNLOAD
    ==================================================== */
    document.getElementById('test-dl-btn').addEventListener('click', () => {
        const text = "お？このファイルダウンロードしたね？てすとだよてすと！";
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, text], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'test.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });
    </script>
</body>
