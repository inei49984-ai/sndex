<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sndex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Space+Grotesk:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* ----------------------------------------------------
           1. 全体設定（スマホでの誤作動・拡大防止）
        ---------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* UI感を強めるために文字選択を禁止 */
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* スマホ長押しメニューを禁止 */
        }

        /* PCの時だけOS標準のカーソルを消す */
        @media (pointer: fine) {
            * {
                cursor: none !important;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #060b16; /* 深いディープネイビー */
            color: #e2e8f0;
            position: relative;
            min-height: 160vh; /* スマホでも心地よいスクロール感を持たせる高さ */
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* スマホで横揺れ・横スクロールするのを完全に防ぐ */
        }

        /* ----------------------------------------------------
           2. クールブルー・カーソルシステム（PC用）
        ---------------------------------------------------- */
        #cursor-ring {
            width: 44px;
            height: 44px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            background: rgba(0, 210, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            display: none; /* 初期状態は非表示（JSでPC判定なら表示） */
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, opacity 0.2s,
                        width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25),
                        height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }

        #cursor-ring.hover {
            width: 90px;
            height: 90px;
            border-color: #ffffff;
            background: rgba(0, 210, 255, 0.06);
            box-shadow: 0 0 30px #00d2ff, inset 0 0 15px rgba(0, 210, 255, 0.2);
        }

        #cursor-dot-container {
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(0, 210, 255, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translate(-50%, -50%);
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        #cursor-dot-container::before {
            content: '';
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 12px #00d2ff;
        }

        /* 移動時の光の粒子 */
        .cursor-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00d2ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 8px #00d2ff, 0 0 12px #00d2ff;
            transform: translate(-50%, -50%); 
            animation: fadeOut 0.4s forwards ease-out;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
        }

        /* ----------------------------------------------------
           2.5 スマホタップ用の波紋エフェクト（NEW）
        ---------------------------------------------------- */
        .touch-ripple {
            position: fixed;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 15px #00d2ff;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes rippleEffect {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        /* ----------------------------------------------------
           3. 各セクションのレイアウト（レスポンシブ対応）
        ---------------------------------------------------- */
        /* 第1画面：メインヒーロー */
        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 20px;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            width: 80%;
            max-width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.06) 0%, rgba(6, 11, 22, 0) 70%);
            z-index: 0;
        }

        /* 【スマホ調整】文字サイズを画面幅に合わせて最適化 */
        .brand-huge {
            font-size: clamp(65px, 16vw, 220px); /* スマホ（最小65px）〜PCまで可変 */
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -3px;
            line-height: 0.85;
            text-transform: lowercase;
            z-index: 10;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            /* スマホでのタップ反応を良くする設定 */
            touch-action: manipulation;
        }

        .brand-huge span {
            color: #00d2ff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        }

        /* PCの時だけホバーで拡大 */
        @media (pointer: fine) {
            .brand-huge:hover {
                transform: scale(1.02);
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            letter-spacing: 4px;
            color: #24354b;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(6px); }
        }

        /* 中間：コンテンツセクション（説明文 ＆ DLボタン） */
        .content-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
            z-index: 10;
        }

        .site-description {
            font-size: clamp(15px, 4vw, 22px); /* スマホ対応のフォントサイズ */
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* ダウンロードボタン */
        .download-trigger {
            background: rgba(0, 210, 255, 0.03);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
            transition: all 0.25s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; /* スマホタップ時のグレーの影を消す */
        }

        /* PCホバー時のみ発光 */
        @media (pointer: fine) {
            .download-trigger:hover {
                background: #ffffff;
                color: #060b16;
                border-color: #ffffff;
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 40px rgba(0, 210, 255, 0.4);
                transform: translateY(-2px);
            }
        }

        /* スマホ・PC共通のタップ/クリックした瞬間 */
        .download-trigger:active {
            transform: translateY(1px) scale(0.96);
            background: rgba(0, 210, 255, 0.2);
        }

        /* 最下部：ミニサインエリア */
        .footer-signature-container {
            margin-top: auto; 
            width: 100%;
            padding: 60px 0 50px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #03060d; 
            border-top: 1px solid rgba(255, 255, 255, 0.01);
        }

        .brand-signature {
            font-family: 'Alex Brush', cursive;
            font-size: clamp(38px, 6vw, 65px);
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.7;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (pointer: fine) {
            .brand-signature:hover {
                opacity: 1;
                color: #ffffff;
                letter-spacing: 5px;
                text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            }
        }

        .signature-sub {
            font-size: 10px;
            color: #24354b;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="cursor-ring"></div>
    <div id="cursor-dot-container"></div>

    <div class="hero-section">
        <h1 class="brand-huge">sndex<span>.</span></h1>
        <div class="scroll-indicator">↓ Scroll Down</div>
    </div>

    <div class="content-section">
        <p class="site-description">
            このサイトはファイルなどを提供しています。
        </p>
        <button class="download-trigger" id="test-dl-btn">
            testのダウンロード
        </button>
    </div>

    <div class="footer-signature-container">
        <h2 class="brand-signature">Sndex</h2>
        <p class="signature-sub">AUTHENTIC SIGNATURE</p>
    </div>

    <script>
        const ring = document.getElementById('cursor-ring');
        const dotContainer = document.getElementById('cursor-dot-container');
        
        let mouseX = 0; let mouseY = 0;
        let ringX = 0; let ringY = 0;
        const delaySpeed = 0.13;

        // PC（マウス環境）かスマホ（タッチ環境）かを判定するフラグ
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        if (!isTouchDevice) {
            // 【PC用の処理】カーソルを表示して動かす
            ring.style.display = 'block';
            dotContainer.style.display = 'flex';

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                dotContainer.style.left = mouseX + 'px';
                dotContainer.style.top = mouseY + 'px';
                
                ring.style.opacity = '1';
                dotContainer.style.opacity = '1';

                createParticle(mouseX, mouseY);
            });

            document.addEventListener('mouseleave', () => { ring.style.opacity = '0'; dotContainer.style.opacity = '0'; });
            document.addEventListener('mouseenter', () => { ring.style.opacity = '1'; dotContainer.style.opacity = '1'; });

            function animateCursor() {
                ringX += (mouseX - ringX) * delaySpeed;
                ringY += (mouseY - ringY) * delaySpeed;
                ring.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            // PCホバー拡大効果の紐付け
            const interactiveElements = [
                document.querySelector('.brand-huge'),
                document.querySelector('#test-dl-btn'),
                document.querySelector('.brand-signature')
            ];
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('hover'));
                el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
            });

            function createParticle(x, y) {
                if (Math.abs(mouseX - ringX) < 1 && Math.abs(mouseY - ringY) < 1) return;
                const particle = document.createElement('div');
                particle.classList.add('cursor-particle');
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 400); 
            }
        } else {
            // 【スマホ用の処理】画面をタップした場所に波紋エフェクトを咲かせる
            window.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                createTouchRipple(touch.clientX, touch.clientY);
                createMobileParticle(touch.clientX, touch.clientY);
            }, { passive: true });
        }

        // スマホ用波紋生成
        function createTouchRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.classList.add('touch-ripple');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        }

        // スマホ用タップ時スパーク（粒子）
        function createMobileParticle(x, y) {
            for(let i=0; i<3; i++) { // タップ時に3粒ハジける
                const p = document.createElement('div');
                p.classList.add('cursor-particle');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 400);
            }
        }

        // txtファイル自動生成・自動ダウンロード
        document.getElementById('test-dl-btn').addEventListener('click', () => {
            const textContent = "お？このファイルダウンロードしたね？てすとだよてすと！";
            const blob = new Blob([textContent], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'test.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
